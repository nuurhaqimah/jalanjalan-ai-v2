<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login • Route2Go</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card" role="region" aria-labelledby="loginTitle">
        <div class="login-header">
          <img
            src="{{ url_for('static', filename='assets/logo.png') }}"
            alt="Route2Go logo"
          />
          <h1 id="loginTitle" class="login-title">User Login</h1>
        </div>
        <p class="login-subtitle">Please sign in to plan your trip.</p>

        {% if error %}
        <div class="error-alert" role="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/user/login" novalidate>
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input
              id="username"
              class="form-input"
              type="text"
              name="username"
              placeholder="Enter username"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              id="password"
              class="form-input"
              type="password"
              name="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="submit-btn" aria-label="Sign in">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M7 10V8a5 5 0 0 1 10 0v2"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <rect
                x="5"
                y="10"
                width="14"
                height="10"
                rx="2"
                stroke="currentColor"
                stroke-width="2"
              />
              <circle cx="12" cy="15" r="1.5" fill="currentColor" />
            </svg>
            Continue
          </button>
        </form>

        <div class="login-footer">
          <a href="{{ url_for('user_signup') }}" class="back-link"
            >Create account →</a
          >
          <a href="{{ url_for('index') }}" class="back-link">Back to Home</a>
        </div>
      </section>
    </main>
  </body>
</html>
