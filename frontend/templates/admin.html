<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard • JalanJalan.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <nav class="main-navbar">
      <div class="logo">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo" />
        <a href="{{ url_for('index') }}" class="no-underline">JalanJalan.AI</a>
      </div>
      <ul class="nav-links">
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('index') }}#how">How It works</a></li>
        <li><a href="{{ url_for('contact') }}">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="{{ url_for('logout') }}" class="admin-login-btn">Logout</a>
      </div>
    </nav>

    <div class="admin-wrapper">
      <h1 class="admin-page-title">Admin Dashboard</h1>

      <!-- Add / Update Form -->
      <div class="admin-card">
        <h2>Add / Update Destination</h2>
        <form id="destinationForm">
          <input type="hidden" id="destinationId" />

          <input class="form-input" type="text" id="name" placeholder="Destination Name" required />

          <select id="category" required>
            <option value="">Select Category</option>
            <option value="alam">Alam (Nature)</option>
            <option value="kuliner">Kuliner (Culinary)</option>
            <option value="sejarah">Sejarah (Historical)</option>
            <option value="belanja">Belanja (Shopping)</option>
          </select>

          <select id="budget_level" required>
            <option value="">Select Budget Level</option>
            <option value="cheap">Cheap</option>
            <option value="moderate">Moderate</option>
            <option value="luxury">Luxury</option>
          </select>

          <select id="travel_style" required>
            <option value="">Select Travel Style</option>
            <option value="relaxing">Relaxing</option>
            <option value="adventure">Adventure</option>
            <option value="cultural">Cultural</option>
            <option value="family">Family</option>
          </select>

          <input class="form-input" type="text" id="location" name="location" placeholder="Location (city, town, region)" required />

          <select id="country" name="country" required>
            <option value="">Select Country</option>
          </select>

          <textarea id="description" placeholder="Description (optional)"></textarea>

          <button type="submit" class="admin-save-btn">Save Destination</button>
        </form>
      </div>

      <!-- Destinations Table -->
      <div class="admin-card">
        <h2>All Destinations</h2>
        <div style="overflow-x: auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Budget</th>
                <th>Style</th>
                <th>Location</th>
                <th>Country</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="destinationsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById('destinationForm');
      const tableBody = document.getElementById('destinationsTable');
      const countrySelect = document.getElementById('country');

      function toFormData(obj) {
        const fd = new FormData();
        Object.entries(obj).forEach(([k, v]) => {
          if (v !== undefined && v !== null) fd.append(k, v);
        });
        return fd;
      }

      function renderTable(pois) {
        tableBody.innerHTML = '';
        pois.forEach((dest) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${dest.name}</td>
            <td>${dest.category}</td>
            <td>${dest.budget_level}</td>
            <td>${dest.travel_style || ''}</td>
            <td>${dest.location}</td>
            <td>${dest.country || ''}</td>
            <td>
              <button class="admin-edit-btn" data-id="${dest.id}">Edit</button>
              <button class="admin-delete-btn" data-id="${dest.id}">Delete</button>
            </td>
          `;
          tableBody.appendChild(tr);
        });
      }

      async function loadPois() {
        try {
          const res = await fetch('/admin/pois');
          const data = await res.json();
          if (res.ok && data.status === 'success') {
            renderTable(data.data || []);
          } else {
            alert(data.message || 'Failed to load POIs');
          }
        } catch (e) {
          alert('Network error while loading POIs');
        }
      }

      async function loadCountries() {
        try {
          const res = await fetch('/api/poi/filters');
          const data = await res.json();
          const preset = ['Brunei', 'Malaysia', 'Thailand', 'Singapore', 'Indonesia', 'Philippines'];
          const countries = Array.from(new Set([...(data.countries || []), ...preset]));
          countrySelect.innerHTML = '<option value="">Select Country</option>';
          countries.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c; countrySelect.appendChild(opt);
          });
        } catch (e) { /* ignore */ }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('destinationId').value;
        const payload = {
          name:         document.getElementById('name').value,
          category:     document.getElementById('category').value,
          budget_level: document.getElementById('budget_level').value,
          travel_style: document.getElementById('travel_style').value,
          location:     document.getElementById('location').value,
          country:      document.getElementById('country').value,
          description:  document.getElementById('description').value,
        };
        try {
          let res, data;
          if (id) {
            res  = await fetch(`/admin/poi/${id}`, { method: 'PUT', body: toFormData(payload) });
            data = await res.json();
          } else {
            res  = await fetch('/admin/add', { method: 'POST', body: toFormData(payload) });
            data = await res.json();
          }
          if (res.ok && data.status === 'success') {
            form.reset();
            document.getElementById('destinationId').value = '';
            loadPois();
            if (data.message) alert(data.message);
          } else {
            alert(data.message || 'Operation failed');
          }
        } catch (err) {
          alert('Network error while saving POI');
        }
      });

      tableBody.addEventListener('click', async (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const id = btn.getAttribute('data-id');
        if (btn.classList.contains('admin-delete-btn')) {
          if (!confirm('Delete this POI?')) return;
          try {
            const res  = await fetch(`/admin/poi/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (res.ok && data.status === 'success') {
              loadPois();
            } else {
              alert(data.message || 'Failed to delete');
            }
          } catch (err) {
            alert('Network error while deleting POI');
          }
        } else if (btn.classList.contains('admin-edit-btn')) {
          const row = btn.closest('tr');
          document.getElementById('destinationId').value = id;
          document.getElementById('name').value         = row.children[0].textContent;
          document.getElementById('category').value     = row.children[1].textContent;
          document.getElementById('budget_level').value = row.children[2].textContent;
          document.getElementById('travel_style').value = row.children[3].textContent;
          document.getElementById('location').value     = row.children[4].textContent;
          document.getElementById('country').value      = row.children[5].textContent;
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      loadCountries();
      loadPois();
    </script>
  </body>
</html>
